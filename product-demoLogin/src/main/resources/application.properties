# archivo para configurar las dependencias que tiene el proyecto
spring.application.name=Inmobiliaria Eden


# Configuracion de base de datos PostgreSQL (configuración principal)
#local
#spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bd_eden}
#spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
#spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}


# Configuracion dinamica
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${NEON_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Puerto del servidor
server.port=${PORT:8080}
#credenciales de clave secreta para cifrado de tokens JWT
jwt.secret=${JWT_SECRET}


#credenciales de clave secreta para cifrado de tokens


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#spring.sendgrid.api-key=${SENDGRID_API_KEY}
#sendgrid.from.email=${SENDGRID_FROM_EMAIL}
#sendgrid.from.name=${SENDGRID_FROM_NAME}


cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}


#Recaptcha
google.recaptcha.secret=${RECAPTCHA_SECRET}

# Frontend URLs for CORS configuration
frontend.url=${FRONTEND_URL}
frontend.local.url=${FRONTEND_LOCAL_URL}
cloudfront.url=${CLOUDFRONT_URL:}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB
# Esto ayuda a que Spring entienda que viene de un Proxy (CloudFront/Nginx)
server.forward-headers-strategy=native
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_FROM_EMAIL}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Exponer el endpoint de Prometheus
# URL interna de Prometheus
prometheus.url=${PROMETHEUS_URL:http://prometheus:9090}
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.prometheus.metrics.export.enabled=true


